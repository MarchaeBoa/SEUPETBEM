<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar - PetCare Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <div class="auth-card">
    <a href="/" class="auth-logo"><span>🐾</span> PetCare Pro</a>
    <h1>Entrar na sua conta</h1>
    <p class="subtitle">Bem-vindo de volta! Acesse seu painel.</p>

    <div id="alert" class="alert" role="alert" aria-live="polite"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Entrar</button>
    </form>

    <p class="auth-footer">
      Ainda não tem conta? <a href="/signup.html">Criar conta grátis</a>
    </p>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
