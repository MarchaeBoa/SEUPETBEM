<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta - PetCare Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <div class="auth-card">
    <a href="/" class="auth-logo"><span>🐾</span> PetCare Pro</a>
    <h1>Crie sua conta grátis</h1>
    <p class="subtitle">14 dias de teste. Sem cartão de crédito.</p>

    <div id="alert" class="alert error"></div>

    <form id="signup-form">
      <div class="form-group">
        <label for="business_name">Nome do seu negócio</label>
        <input type="text" id="business_name" name="business_name" required placeholder="Ex: Clínica Pet Feliz" />
      </div>
      <div class="form-group">
        <label for="name">Seu nome</label>
        <input type="text" id="name" name="name" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Senha (mínimo 6 caracteres)</label>
        <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Criar conta</button>
    </form>

    <p class="auth-footer">
      Já tem conta? <a href="/login.html">Fazer login</a>
    </p>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
